<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App post it</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="tachuela-ezquinada"><img id="tachuela-izquierda" src="tachuela.png" alt=""><img id="tachuela-derecha" src="tachuela.png" alt=""></section>

      <main class="post-it">
        <menu class="comandos-superior">
            
            <button class="abrir-mas-postit"><img class="plus" src="comandos_imagenes/circle-plus.png" alt=""></button>
            <button class="crear-lista"><img class="list" src="comandos_imagenes/list.png" alt=""></button>
            <button class="cambio-fondo"><img class="founds" src="comandos_imagenes/circle-ellipsis.png" alt=""></button>
            <button class="guardar-postit"><img class="save" src="comandos_imagenes/save.png" alt=""></button>
            <button class="cerrar-postit"><img class="close" src="comandos_imagenes/x.png" alt=""></button>   
        </menu>

        <section class="comando-escribir-titulo"><textarea class="title" placeholder="Escribe titulo" ></textarea></section>
    
        <div class="contenedor-imagen-fondo">
            <textarea class="contenido-postit" ></textarea>
        <img class="imagenes-fondos" src="fondos/calabera.jpg">
    </div>

    </main>

    <div class="contenedor-carpeta">
        <button id="carpeta"><img class="logo-carpeta" src="carpeta.jpeg" alt=""> Carpeta</button>
    </div>

    <div id="panel-carpeta">
  <div class="panel-head">
    <strong> <img class="carpeta-dentro-contenedorcarpeta" src="carpeta.jpeg" alt=""> Posts it guardados</strong>
    <button id="cerrar-carpeta">✖</button>
  </div>

  <div id="lista-carpeta"></div>
</div>

    <button class="logo-accion-principal"><img class="logo-accion" src="logo_principal/logo.jpeg" alt=""></button>

    
    <script src="script.js"></script>
</body>
</html>
